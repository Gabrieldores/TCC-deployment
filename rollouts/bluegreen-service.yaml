apiVersion: v1
kind: Service
metadata:
  name: tcc-api-active
  namespace: app-tcc
  labels:
    app: tcc-api
    slot: active
spec:
  selector:
    app: tcc-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: tcc-api-preview
  namespace: app-tcc
  labels:
    app: tcc-api
    slot: preview
spec:
  selector:
    app: tcc-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP